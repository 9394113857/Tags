import os
import subprocess
import time
from datetime import datetime

# =========================
# 📦 REPO DETAILS
# =========================
REPO_URL = "https://github.com/9394113857/backend-auth-service.git"
REPO_NAME = "backend-auth-service"

def log(msg):
    print(f"[{datetime.now().strftime('%H:%M:%S')}] {msg}")

def run(cmd):
    return subprocess.getoutput(cmd)

# =========================
# 📥 CLONE / LOAD REPO
# =========================
repo_path = f"/content/{REPO_NAME}"

log("📥 Checking repository...")

if not os.path.exists(repo_path):
    log("Cloning repository...")
    os.system(f"git clone {REPO_URL} {repo_path}")
else:
    log("Repo already exists")

os.chdir(repo_path)

# =========================
# 🔄 SYNC LATEST
# =========================
log("🔄 Pulling latest code...")
print(run("git pull origin main"))

log("🔄 Fetching tags...")
print(run("git fetch --tags"))

# =========================
# 🏷️ GET LATEST TAG
# =========================
latest_tag = run("git tag --sort=-v:refname | head -n 1").strip()

if latest_tag == "":
    latest_tag = "v1.0.0"

log(f"📌 Latest tag: {latest_tag}")

# =========================
# 🔢 INCREMENT VERSION
# =========================
try:
    v = latest_tag.replace("v", "")
    major, minor, patch = map(int, v.split("."))
except:
    major, minor, patch = 1, 0, 0

patch += 1
new_tag = f"v{major}.{minor}.{patch}"

log(f"🚀 Prepared new tag: {new_tag}")

# =========================
# ❓ USER CONFIRMATION ONLY
# =========================
confirm = input("👉 Type YES to create & push tag (default NO): ").strip().upper()

if confirm != "YES":
    log("❌ Operation cancelled by user")
    exit()

# =========================
# 🏷️ CREATE TAG
# =========================
log("🏷️ Creating tag...")
print(run(f"git tag {new_tag}"))

# =========================
# 📤 PUSH TAG
# =========================
log("📤 Pushing tag to GitHub...")
print(run(f"git push origin {new_tag}"))

# =========================
# 🎉 FINAL OUTPUT
# =========================
log("===================================")
log(f"✅ SUCCESS: {new_tag} pushed")
log("🚀 GitHub Actions triggered")
log("===================================")

exit()
