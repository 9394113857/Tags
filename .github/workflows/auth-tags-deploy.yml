name: 🔥 AUTH SERVICE TAG DEPLOYMENT

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Setup Auth Token (from secrets)
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          echo "======================================="
          echo "🔐 AUTH TOKEN LOADED (hidden for security)"
          echo "======================================="

      - name: 🏷️ Show Trigger Info
        run: |
          echo "======================================="
          echo "🚀 DEPLOYMENT STARTED"
          echo "⏰ Time: $(date)"
          echo "🏷️ Tag Triggered: $GITHUB_REF_NAME"
          echo "📦 Repo: $GITHUB_REPOSITORY"
          echo "======================================="

      - name: 📜 Show Latest Commit
        run: |
          echo "Latest commit:"
          git log -1
          echo "======================================="

      - name: 🔧 Build Stage
        run: |
          echo "======================================="
          echo "🔧 BUILD STARTING"
          echo "Installing dependencies..."
          sleep 2
          echo "Building service..."
          sleep 2
          echo "BUILD SUCCESS ✅"
          echo "======================================="

      - name: 🚀 Deploy Stage
        run: |
          echo "======================================="
          echo "🚀 DEPLOYING AUTH SERVICE"
          echo "Version: $GITHUB_REF_NAME"
          echo "Target: production"
          echo "Deploying..."
          sleep 2
          echo "DEPLOY SUCCESS 🎉"
          echo "======================================="

      - name: 📊 Final Summary
        run: |
          echo "======================================="
          echo "✅ DEPLOYMENT COMPLETE"
          echo "🏷️ Released Tag: $GITHUB_REF_NAME"
          echo "🕒 Finished at: $(date)"
          echo "======================================="
